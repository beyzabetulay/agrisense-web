version: "3.8"

services:
  backend:
    build:
      context: ./agrisense-backend/agrisense-backend
      dockerfile: Dockerfile
    container_name: agrisense-backend
    ports:
      - "8081:8081"
    environment:
      - QUARKUS_HTTP_PORT=8081
      - QUARKUS_HTTP_HOST=0.0.0.0
    restart: unless-stopped

  frontend:
    build:
      context: ./agrisense-frontend
      dockerfile: Dockerfile
    container_name: agrisense-frontend
    ports:
      - "3000:80"
    depends_on:
      - backend
    restart: unless-stopped
